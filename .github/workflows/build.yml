name: Build

on:
  push:
    branches: [main, master, develop]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew shadowJar

      - name: Collect JARs
        run: |
          mkdir -p jars
          find . -path "*/build/libs/*.jar" -type f \
            ! -name "*-sources.jar" \
            ! -name "*-javadoc.jar" \
            ! -name "*-tests.jar" \
            ! -name "*-plain.jar" \
            -exec cp {} jars/ \;

      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: jars-${{ github.sha }}
          path: jars/*.jar
          if-no-files-found: error
          retention-days: 14
