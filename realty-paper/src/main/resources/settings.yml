# default-freehold-titleholder-uuid is optional, leave it blank to default to no-titleholder
# default-freehold-titleholder-uuid: "00000000-0000-0000-0000-000000000000"
default-freehold-authority-uuid: "00000000-0000-0000-0000-000000000000"
default-leasehold-authority-uuid: "00000000-0000-0000-0000-000000000000"
date-format: "EEE, d MMMM yyyy (HH:mm)"
# Maximum number of region profiles to re-apply per tick during startup/reload.
# Lower values reduce lag spikes, higher values complete faster.
profile-reapply-per-tick: 10
# Minimum volume (in blocks) for subregion selections.
subregion-min-volume: 20
# Duration (in seconds) for an accepted offer payment deadline. Default: 86400 (24 hours).
offer-payment-duration-seconds: 86400
# Tag IDs that prevent a parent region from being subregioned.
# If a region has any of these tags, it cannot be used as a parent for subregion creation.
subregion-tag-blacklist: []