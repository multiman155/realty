name: Realty
version: "${version}"
main: io.github.md5sha256.realty.Realty
api-version: "1.21.8"
authors: [ md5sha256 ]
dependencies:
  server:
    Vault:
      load: BEFORE
      join-classpath: true
      required: true
    WorldGuard:
      load: BEFORE
      join-classpath: true
      required: true
    Essentials:
      load: BEFORE
      join-classpath: true
      required: false
permissions:
  realty.command.agent.invite:
    description: Allows using /realty agent invite
    default: op
  realty.command.agent.invite.accept:
    description: Allows using /realty agent invite accept
    default: true
  realty.command.agent.invite.reject:
    description: Allows using /realty agent invite reject
    default: true
  realty.command.agent.invite.withdraw:
    description: Allows using /realty agent invite withdraw
    default: op
  realty.command.agent.remove:
    description: Allows using /realty agent remove
    default: op
  realty.command.add:
    description: Allows using /realty add
    default: op
  realty.command.add.others:
    description: Allows adding players/groups to regions you don't own
    default: op
  realty.command.remove:
    description: Allows using /realty remove
    default: op
  realty.command.remove.others:
    description: Allows removing players/groups from regions you don't own
    default: op
  realty.command.help:
    description: Allows using /realty help
    default: true
  realty.command.history:
    description: Allows using /realty history
    default: true
  realty.command.info:
    description: Allows using /realty info
    default: true
  realty.command.list:
    description: Allows using /realty list
    default: true
  realty.command.delete:
    description: Allows using /realty delete
    default: op
  realty.command.delete.includeworldguard:
    description: Allows deleting WorldGuard regions alongside realty regions
    default: op
  realty.command.create.leasehold:
    description: Allows using /realty create leasehold
    default: op
  realty.command.create.freehold:
    description: Allows using /realty create freehold
    default: op
  realty.command.register.leasehold:
    description: Allows using /realty register leasehold
    default: op
  realty.command.register.freehold:
    description: Allows using /realty register freehold
    default: op
  realty.command.offer.send:
    description: Allows using /realty offer send
    default: true
  realty.command.offer.inbox:
    description: Allows using /realty offer inbox
    default: true
  realty.command.offer.outbox:
    description: Allows using /realty offer outbox
    default: true
  realty.command.offer.accept:
    description: Allows using /realty offer accept
    default: op
  realty.command.offer.pay:
    description: Allows using /realty offer pay
    default: true
  realty.command.offer.withdraw:
    description: Allows using /realty offer withdraw
    default: true
  realty.command.offer.reject:
    description: Allows using /realty offer reject
    default: true
  realty.command.offer.toggle:
    description: Allows using /realty offer toggle
    default: op
  realty.command.offer.toggle.bypass:
    description: Bypasses ownership/agent check for /realty offer toggle
    default: op
  realty.command.auction:
    description: Allows using /realty auction (create)
    default: op
  realty.command.auction.cancel:
    description: Allows using /realty auction cancel
    default: op
  realty.command.auction.info:
    description: Allows using /realty auction info
    default: true
  realty.command.auction.bid:
    description: Allows using /realty auction bid
    default: true
  realty.command.buy:
    description: Allows using /realty buy
    default: true
  realty.command.auction.paybid:
    description: Allows using /realty auction paybid
    default: true
  realty.command.extend:
    description: Allows using /realty extend
    default: true
  realty.command.rent:
    description: Allows using /realty rent
    default: true
  realty.command.unrent:
    description: Allows using /realty unrent
    default: true
  realty.command.set.price:
    description: Allows using /realty set price on own regions
    default: op
  realty.command.set.price.others:
    description: Allows using /realty set price on regions you don't own
    default: op
  realty.command.set.duration:
    description: Allows using /realty set duration on own regions
    default: op
  realty.command.set.duration.others:
    description: Allows using /realty set duration on regions you don't own
    default: op
  realty.command.set.landlord:
    description: Allows using /realty set landlord on own regions
    default: op
  realty.command.set.landlord.others:
    description: Allows using /realty set landlord on regions you don't own
    default: op
  realty.command.set.titleholder:
    description: Allows using /realty set titleholder on own regions
    default: op
  realty.command.set.titleholder.others:
    description: Allows using /realty set titleholder on regions you don't own
    default: op
  realty.command.set.tenant:
    description: Allows using /realty set tenant on own regions
    default: op
  realty.command.set.tenant.others:
    description: Allows using /realty set tenant on regions you don't own
    default: op
  realty.command.set.maxextensions:
    description: Allows using /realty set maxextensions on own regions
    default: op
  realty.command.set.maxextensions.others:
    description: Allows using /realty set maxextensions on regions you don't own
    default: op
  realty.command.unset.price:
    description: Allows using /realty unset price on own regions
    default: op
  realty.command.unset.price.others:
    description: Allows using /realty unset price on regions you don't own
    default: op
  realty.command.unset.titleholder:
    description: Allows using /realty unset titleholder on own regions
    default: op
  realty.command.unset.titleholder.others:
    description: Allows using /realty unset titleholder on regions you don't own
    default: op
  realty.command.unset.tenant:
    description: Allows using /realty unset tenant on own regions
    default: op
  realty.command.unset.tenant.others:
    description: Allows using /realty unset tenant on regions you don't own
    default: op
  realty.command.reload:
    description: Allows using /realty reload
    default: op
  realty.command.subregion.quickcreate:
    description: Allows using /realty subregion quickcreate
    default: op
  realty.command.subregion.quickcreate.bypass:
    description: Allows subregioning on freehold regions you don't own
    default: op
  realty.command.tp:
    description: Allows using /realty tp
    default: op
  realty.command.sign.place:
    description: Allows using /realty sign place
    default: op
  realty.command.sign.remove:
    description: Allows using /realty sign remove
    default: op
  realty.command.sign.list:
    description: Allows using /realty sign list
    default: op
