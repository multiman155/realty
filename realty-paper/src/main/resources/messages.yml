help:
  main:
    - "<gold>--- Realty > Commands ---</gold>"
    - "<gray>Click one of the categories to learn more.</gray>"
    - ""
    - "<click:run_command:/realty help basics><yellow><bold>Basics</bold></yellow> <gray>- General commands</gray></click>"
    - "<click:run_command:/realty help offers><yellow><bold>Offers</bold></yellow> <gray>- Buying regions via offers</gray></click>"
    - "<click:run_command:/realty help auctions><yellow><bold>Auctions</bold></yellow> <gray>- Bidding on region auctions</gray></click>"
  unknown-category: "<red>Unknown category. Use: basics, offers, or auctions.</red>"
  basics:
    - "<gold>--- Realty > Basics ---</gold>"
    - "<yellow>/realty help</yellow> <gray>- Show help categories</gray>"
    - "<yellow>/realty info <region></yellow> <gray>- Display region info</gray>"
    - "<yellow>/realty list [owned|rented] [--page <n>] [--player <name>]</yellow> <gray>- List regions</gray>"
    - "<yellow>/realty buy <region></yellow> <gray>- Buy a region at the listed price</gray>"
    - "<yellow>/realty rent <region></yellow> <gray>- Rent a region</gray>"
    - "<yellow>/realty renew <region></yellow> <gray>- Renew a lease</gray>"
    - "<yellow>/realty add <player> <region></yellow> <gray>- Add a player to a region</gray>"
    - "<yellow>/realty set price <price> <region></yellow> <gray>- Set region sale price</gray>"
    - "<yellow>/realty unset price <region></yellow> <gray>- Remove region sale price</gray>"
    - "<yellow>/realty unset titleholder <region></yellow> <gray>- Clear sale title holder</gray>"
    - "<yellow>/realty unset tenant <region></yellow> <gray>- Clear lease tenant</gray>"
    - "<yellow>/realty set duration <duration> <region></yellow> <gray>- Set lease duration</gray>"
    - "<yellow>/realty set landlord <player> <region></yellow> <gray>- Set lease landlord</gray>"
    - "<yellow>/realty set titleholder <player> <region></yellow> <gray>- Set sale title holder</gray>"
    - "<yellow>/realty set tenant <player> <region></yellow> <gray>- Set lease tenant</gray>"
    - "<yellow>/realty agent add <player> <region></yellow> <gray>- Add a sanctioned auctioneer</gray>"
    - "<yellow>/realty agent remove <player> <region></yellow> <gray>- Remove a sanctioned auctioneer</gray>"
  offers:
    - "<gold>--- Realty > Offers ---</gold>"
    - "<yellow>/realty offer send <price> <region></yellow> <gray>- Make an offer on a region</gray>"
    - "<yellow>/realty offer inbox</yellow> <gray>- View offers received on your regions</gray>"
    - "<yellow>/realty offer outbox</yellow> <gray>- View offers you have sent</gray>"
    - "<yellow>/realty offer accept <player> <region></yellow> <gray>- Accept an offer</gray>"
    - "<yellow>/realty offer pay <amount> <region></yellow> <gray>- Pay for an accepted offer</gray>"
    - "<yellow>/realty offer withdraw <region></yellow> <gray>- Withdraw your offer</gray>"
    - "<yellow>/realty offer reject <player> [region]</yellow> <gray>- Reject an offer</gray>"
    - "<yellow>/realty offer rejectall [region]</yellow> <gray>- Reject all offers</gray>"
  auctions:
    - "<gold>--- Realty > Auctions ---</gold>"
    - "<yellow>/realty auction <bidDuration> <paymentDuration> <minBid> <minBidStep> <region></yellow> <gray>- Create an auction</gray>"
    - "<yellow>/realty auction bid <amount> <region></yellow> <gray>- Bid on an auction</gray>"
    - "<yellow>/realty auction paybid <amount> <region></yellow> <gray>- Pay for a winning bid</gray>"
    - "<yellow>/realty auction cancel <region></yellow> <gray>- Cancel an auction</gray>"
  admin:
    - "<gold>--- Realty > Admin ---</gold>"
    - "<yellow>/realty create sale <price> [--titleholder <name>] [--authority <name>] <region></yellow> <gray>- Create a sale</gray>"
    - "<yellow>/realty create lease <price> <period> <maxrenewals> [--landlord <name>] <region></yellow> <gray>- Create a lease</gray>"
    - "<yellow>/realty remove <player> <region></yellow> <gray>- Remove a player from a region</gray>"
    - "<yellow>/realty delete <region> [includeworldguard]</yellow> <gray>- Delete a region</gray>"
    - "<yellow>/realty reload</yellow> <gray>- Reload configuration</gray>"

