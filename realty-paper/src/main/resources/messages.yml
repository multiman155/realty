notification:
  offer-placed: "<prefix> <player> placed an offer of <price> on region <region>."
  offer-accepted: "<prefix> Your offer on region <region> has been accepted."
  offer-withdrawn: "<prefix> <player> withdrew their offer on region <region>."
  ownership-transferred: "<prefix> Region <region> ownership has been transferred to <player>."
  outbid: "<prefix> You have been outbid on region <region>. New highest bid: <amount>."
