prefix: "[Realty]"

error:
  no-region: "No region specified and you are not standing in a WorldGuard region."

common:
  player-not-found: "Player <player> has never played on this server."
  error: "An error occurred: <error>"

accept-offer:
  success: "Accepted offer from <player> on region <region>."
  no-offer: "Player <player> does not have an offer on region <region>."
  auction-exists: "Region <region> has an auction. Offers cannot be accepted while an auction exists."
  already-accepted: "Region <region> already has an accepted offer."
  insert-failed: "Failed to accept offer on region <region>."
  error: "Failed to accept offer: <error>"

add:
  check-permissions-error: "Failed to check permissions: <error>"
  no-permission: "You do not have permission to add players to this region!"
  success: "Successfully added <target> to region <region>!"

agent-add:
  success: "Added <player> as a sanctioned auctioneer for region <region>."
  failed: "Failed to add <player> as a sanctioned auctioneer for region <region>."
  error: "Failed to add sanctioned auctioneer: <error>"

agent-remove:
  success: "Removed <player> from the sanctioned auctioneers for region <region>."
  not-found: "<player> is not a sanctioned auctioneer for region <region>."
  error: "Failed to remove sanctioned auctioneer: <error>"

auction:
  success: "Auction created for region <region>."
  not-sanctioned: "You are not authorized to start an auction on region <region>."
  no-sale-contract: "Region <region> does not have a sale contract."
  error: "Failed to create auction: <error>"

bid:
  no-auction: "That region does not have an active auction!"
  too-low-minimum: "Bid too low, the minimum bid is <amount>."
  too-low-current: "Bid too low, the next highest bid is <amount>."
  success: "Bid of <amount> placed on region <region>."
  error: "Failed to perform bid: <error>"

cancel-auction:
  no-auction: "That region does not have an active auction!"
  success: "Auction for region <region> has been cancelled."
  error: "Failed to cancel auction: <error>"

create-rental:
  success: "Rental region created successfully!"
  already-registered: "Region already registered!"
  error: "Failed to create rental region: <error>"

create-sale:
  success: "Sale region created successfully!"
  already-registered: "Region already registered!"
  error: "Failed to create sale region: <error>"

delete:
  not-registered: "Region is not registered in Realty!"
  worldguard-save-error: "Failed to save WorldGuard regions: <error>"
  success: "Region deleted successfully!"
  error: "Failed to delete region: <error>"

info:
  header: "--- Region Info: <region> ---"
  no-contracts: "No contracts or auctions found for this region."
  sale:
    - "Sale:"
    - "Title Holder: <title_holder>"
    - "Members: <members>"
    - "Authority: <authority>"
    - "Price: <price>"
  lease:
    - "Lease:"
    - "Landlord: <landlord>"
    - "Tenant: <tenant>"
    - "Price: <price>"
    - "Duration: <duration>"
    - "Start Date: <start_date>"
    - "Extensions: <extensions>"
  auction:
    - "Auction:"
    - "Auctioneer: <auctioneer>"
    - "Start Date: <start_date>"
    - "Bidding Duration: <duration>"
    - "Payment Deadline: <deadline>"
    - "Min Bid: <min_bid>"
    - "Min Step: <min_step>"
  error: "Failed to retrieve region info: <error>"

list:
  players-only: "Only players can use this command without specifying a player."
  no-regions: "No regions found for <player>."
  invalid-page: "Page <page> does not exist. There are <total> page(s)."
  header: "--- Regions for <player> ---"
  category: "<label>:"
  entry: "  - <region>"
  footer: "Page <page> of <total> — /realty list <player> <page>"
  error: "Failed to list regions: <error>"

offers-list:
  no-offers: "You have no outbound offers."
  header: "--- Your Outbound Offers ---"
  entry: "  <region>: <price> (<date>) — <status>"
  error: "Failed to list offers: <error>"

offers-inbound:
  no-offers: "You have no inbound offers."
  header: "--- Inbound Offers on Your Regions ---"
  entry: "  <region>: <player> offered <price> (<date>) — <status>"
  error: "Failed to list inbound offers: <error>"

offer:
  success: "Offer of <price> placed on region <region>."
  no-sale-contract: "Region <region> does not have an active sale contract."
  is-authority: "You cannot place an offer on a region where you are the authority."
  already-has-offer: "You already have an offer on region <region>. Withdraw it first before placing a new one."
  auction-exists: "Region <region> has an auction. Offers cannot be placed while an auction exists."
  insert-failed: "Failed to place offer on region <region>."
  error: "Failed to place offer: <error>"

pay-bid:
  insufficient-funds: "You do not have enough funds. Your balance: <balance>."
  payment-failed: "Payment failed: <error>"
  success: "Payment of <amount> applied to region <region>. Total paid: <total>. Remaining: <remaining>."
  fully-paid: "Payment of <amount> applied to region <region>. Bid fully paid! Region ownership will be transferred to you."
  no-payment-record: "You do not have a winning bid on region <region>. Payment refunded."
  payment-expired: "The payment deadline for region <region> has passed. Payment refunded."
  exceeds-owed: "Payment of <amount> exceeds the remaining amount owed (<owed>) on region <region>. Payment refunded."
  error: "Failed to process payment: <error>. Payment refunded."
  transfer-failed: "Failed to transfer region: WorldGuard region manager not available."
  transfer-success: "Region <region> ownership has been transferred to you."

pay-offer:
  insufficient-funds: "You do not have enough funds. Your balance: <balance>."
  payment-failed: "Payment failed: <error>"
  success: "Payment of <amount> applied to region <region>. Total paid: <total>. Remaining: <remaining>."
  fully-paid: "Payment of <amount> applied to region <region>. Offer fully paid! Region ownership will be transferred to you."
  no-payment-record: "You do not have an accepted offer on region <region>. Payment refunded."
  exceeds-owed: "Payment of <amount> exceeds the remaining amount owed (<owed>) on region <region>. Payment refunded."
  error: "Failed to process payment: <error>. Payment refunded."
  transfer-failed: "Failed to transfer region: WorldGuard region manager not available."
  transfer-success: "Region <region> ownership has been transferred to you."

help:
  - "<prefix> <gold>--- Realty Commands ---</gold>"
  - "<yellow>/realty help</yellow> <gray>- Show this help message</gray>"
  - "<yellow>/realty info <region></yellow> <gray>- Display region info</gray>"
  - "<yellow>/realty list [player] [page]</yellow> <gray>- List regions</gray>"
  - "<yellow>/realty create sale <price> [--titleholder <name>] [--authority <name>] <region></yellow> <gray>- Create a sale</gray>"
  - "<yellow>/realty create lease <price> <period> <maxrenewals> [--landlord <name>] <region></yellow> <gray>- Create a lease</gray>"
  - "<yellow>/realty delete <region> [includeworldguard]</yellow> <gray>- Delete a region</gray>"
  - "<yellow>/realty add <player> <region></yellow> <gray>- Add a player to a region</gray>"
  - "<yellow>/realty remove <player> <region></yellow> <gray>- Remove a player from a region</gray>"
  - "<yellow>/realty rent <region></yellow> <gray>- Rent a region</gray>"
  - "<yellow>/realty renew <region></yellow> <gray>- Renew a lease</gray>"
  - "<yellow>/realty offer <price> <region></yellow> <gray>- Make an offer on a region</gray>"
  - "<yellow>/realty offers outbound|inbound</yellow> <gray>- View your offers</gray>"
  - "<yellow>/realty acceptoffer <player> <region></yellow> <gray>- Accept an offer</gray>"
  - "<yellow>/realty withdrawoffer <region></yellow> <gray>- Withdraw your offer</gray>"
  - "<yellow>/realty payoffer <amount> <region></yellow> <gray>- Pay for an accepted offer</gray>"
  - "<yellow>/realty agent add <player> <region></yellow> <gray>- Add a sanctioned auctioneer</gray>"
  - "<yellow>/realty agent remove <player> <region></yellow> <gray>- Remove a sanctioned auctioneer</gray>"
  - "<yellow>/realty auction <bidDuration> <paymentDuration> <minBid> <minBidStep> <region></yellow> <gray>- Create an auction</gray>"
  - "<yellow>/realty bid <amount> <region></yellow> <gray>- Bid on an auction</gray>"
  - "<yellow>/realty cancelauction <region></yellow> <gray>- Cancel an auction</gray>"
  - "<yellow>/realty paybid <amount> <region></yellow> <gray>- Pay for a winning bid</gray>"
  - "<yellow>/realty reload</yellow> <gray>- Reload configuration</gray>"

renew:
  success: "Lease for region <region> has been renewed for <price>."
  no-lease-contract: "Region <region> does not have a lease contract."
  not-tenant: "You are not the tenant of region <region>."
  no-extensions: "Region <region> has no remaining lease extensions."
  update-failed: "Failed to renew lease for region <region>."
  insufficient-funds: "You do not have enough funds. Your balance: <balance>. Renewal price: <price>."
  payment-failed: "Payment failed: <error>"
  error: "Failed to renew lease: <error>"

rent:
