  no-lease-contract: "Region <region> does not have a lease contract."
  is-landlord: "You cannot rent region <region> because you are the landlord."
  already-occupied: "Region <region> already has a tenant."
  update-failed: "Failed to rent region <region>."
  insufficient-funds: "You do not have enough funds. Your balance: <balance>. Rental price: <price>."
  payment-failed: "Payment failed: <error>"
  error: "Failed to rent region: <error>"

reload:
  success: "Settings and messages reloaded successfully."
  error: "Failed to reload messages: <error>"

remove:
  check-permissions-error: "Failed to check permissions: <error>"
  no-permission: "You do not have permission to remove players from this region!"
